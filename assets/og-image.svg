      <stop offset="0%" stop-color="#FAFAF7"/>
      <stop offset="50%" stop-color="#F5F3EE"/>
      <stop offset="100%" stop-color="#E8E4DB"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top rule -->
  <line x1="360" y1="195" x2="840" y2="195" stroke="#C4B9A8" stroke-width="1"/>

  <!-- Wordmark -->
